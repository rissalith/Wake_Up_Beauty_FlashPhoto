name: Deploy to Production

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      skip_backup:
        description: '跳过部署前备份'
        required: false
        default: 'false'
        type: boolean

env:
  DOMAIN: pop-pub.com
  DEPLOY_PATH: /www/wwwroot/pop-pub.com

jobs:
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Start
        run: |
          if [ -n "${{ secrets.WECHAT_WEBHOOK }}" ]; then
            curl -X POST "${{ secrets.WECHAT_WEBHOOK }}" \
              -H "Content-Type: application/json" \
              -d '{
                "msgtype": "markdown",
                "markdown": {
                  "content": "## 🚀 FlashPhoto 开始部署\n> **分支**: ${{ github.ref_name }}\n> **提交**: `${{ github.sha }}`\n> **提交信息**: ${{ github.event.head_commit.message }}\n> **触发者**: ${{ github.actor }}\n> **时间**: '"$(date '+%Y-%m-%d %H:%M:%S')"'"
                }
              }'
          fi

  deploy:
    needs: notify-start
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed files
        id: changed
        run: |
          # 获取变化的文件列表
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "Changed files: $CHANGED_FILES"
          # 转换为 JSON 数组
          FILES_JSON=$(echo "$CHANGED_FILES" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "files=$FILES_JSON" >> $GITHUB_OUTPUT

      - name: Trigger Deploy via Webhook
        id: deploy
        run: |
          echo "触发部署 Webhook..."

          # 生成包含文件变化的 payload
          PAYLOAD=$(cat <<EOF
          {
            "branch": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "actor": "${{ github.actor }}",
            "commits": [{
              "added": [],
              "modified": ${{ steps.changed.outputs.files }},
              "removed": []
            }]
          }
          EOF
          )

          echo "Payload: $PAYLOAD"

          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | sed 's/^.* //')

          # 重试逻辑：如果部署正在进行中（409），等待后重试
          MAX_RETRIES=10
          RETRY_INTERVAL=30

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "尝试触发部署 ($attempt/$MAX_RETRIES)..."

            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://${{ env.DOMAIN }}/webhook/deploy" \
              -H "Content-Type: application/json" \
              -H "X-Webhook-Signature: sha256=$SIGNATURE" \
              -d "$PAYLOAD" \
              --max-time 30)

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            echo "HTTP 状态码: $HTTP_CODE"
            echo "响应: $BODY"

            if [ "$HTTP_CODE" = "202" ] || [ "$HTTP_CODE" = "200" ]; then
              echo "Webhook 触发成功"
              echo "status=success" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$HTTP_CODE" = "409" ]; then
              echo "部署正在进行中，等待 ${RETRY_INTERVAL} 秒后重试..."
              sleep $RETRY_INTERVAL
            else
              echo "Webhook 触发失败，状态码: $HTTP_CODE"
              echo "status=failed" >> $GITHUB_OUTPUT
              exit 1
            fi
          done

          echo "达到最大重试次数，部署失败"
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1

      - name: Wait for Deployment
        run: |
          echo "等待部署完成..."
          sleep 180

      - name: Verify Deployment
        id: verify
        run: |
          echo "验证部署状态..."

          # 检查健康状态（增加重试次数和间隔）
          for i in {1..20}; do
            echo "尝试 $i/20..."

            HEALTH=$(curl -sf "https://${{ env.DOMAIN }}/api/health" || echo "failed")

            if [ "$HEALTH" != "failed" ]; then
              echo "健康检查通过"
              echo "status=success" >> $GITHUB_OUTPUT
              exit 0
            fi

            sleep 20
          done

          echo "健康检查失败"
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1

      - name: Check Deploy Logs on Failure
        if: failure()
        run: |
          echo "获取部署日志..."
          curl -sf "https://${{ env.DOMAIN }}/webhook/logs" || echo "无法获取日志"

      - name: Notify Success
        if: success()
        run: |
          if [ -n "${{ secrets.WECHAT_WEBHOOK }}" ]; then
            curl -X POST "${{ secrets.WECHAT_WEBHOOK }}" \
              -H "Content-Type: application/json" \
              -d '{
                "msgtype": "markdown",
                "markdown": {
                  "content": "## ✅ FlashPhoto 部署成功\n> **分支**: ${{ github.ref_name }}\n> **提交**: `${{ github.sha }}`\n> **触发者**: ${{ github.actor }}\n> **访问地址**: https://pop-pub.com"
                }
              }'
          fi

      - name: Notify Failure
        if: failure()
        run: |
          if [ -n "${{ secrets.WECHAT_WEBHOOK }}" ]; then
            curl -X POST "${{ secrets.WECHAT_WEBHOOK }}" \
              -H "Content-Type: application/json" \
              -d '{
                "msgtype": "markdown",
                "markdown": {
                  "content": "## ❌ FlashPhoto 部署失败\n> **分支**: ${{ github.ref_name }}\n> **提交**: `${{ github.sha }}`\n> **触发者**: ${{ github.actor }}\n\n[查看完整日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
                }
              }'
          fi
